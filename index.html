<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis 15 · Maria Paz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #e8d08a;
      --gold-pale:   #f5e9c0;
      --white:       #f8f4ee;
      --navy:        #06091a;
      --navy-mid:    #0c1230;
      --glass:       rgba(255, 255, 255, 0.05);
      --glass-border:rgba(201, 168, 76, 0.25);
      --shadow-gold: 0 0 40px rgba(201, 168, 76, 0.35);
      --font-script: 'Great Vibes', cursive;
      --font-body:   'Cormorant Garamond', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    #starCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #1a1042 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, #0d0826 0%, transparent 60%),
        linear-gradient(160deg, #060918 0%, #0c1230 50%, #060918 100%);
      pointer-events: none;
    }

    .parallax-layer {
      position: fixed;
      inset: -5%;
      z-index: 0;
      background: radial-gradient(ellipse 50% 50% at var(--mx, 50%) var(--my, 50%),
                  rgba(100, 70, 200, 0.08) 0%, transparent 70%);
      transition: background 0.4s ease;
      pointer-events: none;
    }

    .sparkle-field {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-light);
      animation: floatUp var(--dur, 12s) var(--delay, 0s) infinite ease-in-out;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.5); opacity: 0; }
      15%  { opacity: 0.8; }
      85%  { opacity: 0.6; }
      100% { transform: translateY(-100vh) scale(1.5) rotate(360deg); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem 5rem;
      text-align: center;
    }

    .ornament {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem auto;
      color: var(--gold);
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeSlide 1.2s ease forwards;
    }
    .ornament::before, .ornament::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .hero-card {
      position: relative;
      max-width: 600px;
      width: 100%;
      padding: 3.5rem 3rem 4rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 2px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 0 80px rgba(201, 168, 76, 0.06),
        0 2px 40px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .hero-card::before, .hero-card::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.6;
    }
    .hero-card::before { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
    .hero-card::after  { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

    .pre-title {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: clamp(2rem, 5vw, 3rem);
      opacity: 0;
      animation: fadeSlide 1s 0.3s ease forwards;
    }

    .name {
      font-family: var(--font-script);
      font-size: clamp(4rem, 16vw, 8rem);
      line-height: 1;
      /* padding vertical para que los ascendentes/descendentes de la tipografía script no se recorten */
      padding-top: 0.25em;
      padding-bottom: 0.2em;
      display: block;
      color: transparent;
      background: linear-gradient(135deg, var(--gold-pale) 0%, var(--gold) 40%, var(--gold-light) 70%, var(--white) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.5));
      opacity: 0;
      animation: nameReveal 1.8s 0.6s cubic-bezier(0.23,1,0.32,1) forwards;
    }

    @keyframes nameReveal {
      0%   { opacity: 0; filter: drop-shadow(0 0 0px transparent) blur(8px); transform: translateY(16px) scale(0.96); }
      60%  { filter: drop-shadow(0 0 30px rgba(201,168,76,0.7)) blur(0); }
      100% { opacity: 1; filter: drop-shadow(0 0 18px rgba(201,168,76,0.4)) blur(0); transform: translateY(0) scale(1); }
    }

    .age-badge {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold-pale);
      border: 1px solid rgba(201,168,76,0.35);
      padding: 0.3em 1.2em;
      border-radius: 1px;
      margin-top: 1.1rem;
      opacity: 0;
      animation: fadeSlide 1s 1.2s ease forwards;
    }

    .invite-text {
      margin-top: 2.2rem;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      font-weight: 300;
      line-height: 1.85;
      color: rgba(248,244,238,0.82);
      letter-spacing: 0.03em;
      opacity: 0;
      animation: fadeSlide 1s 1.5s ease forwards;
    }

    .invite-text strong {
      color: var(--gold-light);
      font-weight: 400;
    }

    .cta-wrap {
      margin-top: 2.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeSlide 1s 2s ease forwards;
    }

    .cta-btn {
      display: inline-block;
      padding: 1rem 2.8rem;
      font-family: var(--font-body);
      font-size: clamp(0.95rem, 3vw, 1.05rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--navy);
      background: linear-gradient(135deg, var(--gold-pale) 0%, var(--gold) 50%, var(--gold-light) 100%);
      border: none;
      border-radius: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
      box-shadow: 0 4px 30px rgba(201,168,76,0.35);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cta-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 45px rgba(201,168,76,0.55), var(--shadow-gold);
      filter: brightness(1.08);
    }
    .cta-btn:hover::before { opacity: 1; }
    .cta-btn:active { transform: translateY(0) scale(0.99); }

    .cta-btn-ghost {
      display: inline-block;
      padding: 0.85rem 2.8rem;
      font-family: var(--font-body);
      font-size: clamp(0.85rem, 2.8vw, 0.95rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gold-light);
      background: transparent;
      border: 1px solid rgba(201,168,76,0.45);
      border-radius: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, color 0.3s ease;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .cta-btn-ghost:hover {
      transform: translateY(-2px);
      background: rgba(201,168,76,0.08);
      box-shadow: 0 4px 30px rgba(201,168,76,0.2);
      color: var(--gold-pale);
      border-color: rgba(201,168,76,0.7);
    }
    .cta-btn-ghost:active { transform: translateY(0); }

    .countdown-wrap {
      width: 100%;
      text-align: center;
    }

    .countdown-label {
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }

    .countdown-display {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 52px;
    }

    .countdown-number {
      font-family: var(--font-body);
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 300;
      color: var(--gold-pale);
      line-height: 1;
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
      font-variant-numeric: tabular-nums;
    }

    .countdown-sublabel {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.55);
      margin-top: 0.35rem;
    }

    .countdown-sep {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: rgba(201,168,76,0.3);
      line-height: 1;
      padding-top: 0.1rem;
      align-self: flex-start;
    }

    .footer-note {
      margin-top: 3rem;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.4);
      opacity: 0;
      animation: fadeSlide 1s 2.5s ease forwards;
    }

    #music-btn {
      position: fixed;
      bottom: 1.6rem;
      right: 1.6rem;
      z-index: 100;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: rgba(6,9,26,0.75);
      backdrop-filter: blur(10px);
      color: var(--gold);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }
    #music-btn:hover {
      background: rgba(201,168,76,0.12);
      box-shadow: 0 0 20px rgba(201,168,76,0.3);
      transform: scale(1.08);
    }
    #music-btn .icon { line-height: 1; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .hero-card { padding: 2.5rem 1.5rem 3rem; }
      .ornament::before, .ornament::after { width: 36px; }
      .cta-btn, .cta-btn-ghost { max-width: 100%; }
      .countdown-display { gap: 0.4rem; }
      .countdown-unit { min-width: 44px; }
    }
  </style>
</head>

<body>

  <canvas id="starCanvas"></canvas>
  <div class="bg-gradient"></div>
  <div class="parallax-layer" id="parallaxLayer"></div>
  <div class="sparkle-field" id="sparkleField"></div>

  <main class="page">
    <article class="hero-card">

      <p class="pre-title">Una noche mágica</p>

      <h1 class="name">Maria Paz</h1>

      <span class="age-badge">✦ &nbsp;Quince Años&nbsp; ✦</span>

      <div class="ornament" style="animation-delay:1.3s">✦</div>

      <p class="invite-text">
        Con todo mi amor te invito a celebrar mis 15<br />
        el día <strong>[FECHA]</strong> a las <strong>[HORA]</strong><br />
        en <strong>[LUGAR]</strong>
      </p>

      <div class="cta-wrap">
        <a
          href="https://wa.me/5493517476374?text=Hola%2C%20soy%20%5Bnombre%5D%20confirmo%20asistencia! 🤍"
          target="_blank"
          rel="noopener noreferrer"
          class="cta-btn"
          aria-label="Confirmar asistencia por WhatsApp"
        >
          Confirmar asistencia 💌
        </a>

        <div class="countdown-wrap">
          <p class="countdown-label">Faltan</p>
          <div class="countdown-display">
            <div class="countdown-unit">
              <span class="countdown-number" id="cd-days">--</span>
              <span class="countdown-sublabel">días</span>
            </div>
            <span class="countdown-sep">·</span>
            <div class="countdown-unit">
              <span class="countdown-number" id="cd-hours">--</span>
              <span class="countdown-sublabel">horas</span>
            </div>
            <span class="countdown-sep">·</span>
            <div class="countdown-unit">
              <span class="countdown-number" id="cd-mins">--</span>
              <span class="countdown-sublabel">minutos</span>
            </div>
          </div>
        </div>

        <a
          href="https://forms.gle/eWcY6BMhd6nwUpmy6"
          target="_blank"
          rel="noopener noreferrer"
          class="cta-btn-ghost"
          aria-label="Sugerir canciones"
        >
          🎵 Canciones que te gustaría escuchar
        </a>
      </div>

      <div class="ornament" style="animation-delay:2.2s; margin-bottom:0">✦</div>

    </article>

    <p class="footer-note">Te esperamos con mucha ilusión &nbsp;·&nbsp; 2026</p>
  </main>

  <audio id="bgAudio" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <button id="music-btn" aria-label="Alternar música" title="Música">
    <span class="icon" id="music-icon">♫</span>
  </button>

  <script>
    (function () {
      const canvas = document.getElementById('starCanvas');
      const ctx    = canvas.getContext('2d');
      let W, H, stars = [];

      function buildStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
          const ts = 1.5 + Math.random() * 4;
          stars.push({
            x: Math.random() * W, y: Math.random() * H,
            r: 0.3 + Math.random() * 1.4,
            alpha: Math.random(),
            dir: Math.random() < 0.5 ? 1 : -1,
            speed: (0.003 + Math.random() * 0.007) * (1 / ts) * 60,
            gold: Math.random() < 0.12
          });
        }
      }

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        buildStars(Math.round((W * H) / 3000));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.alpha += s.speed * s.dir;
          if (s.alpha >= 1)    { s.alpha = 1;    s.dir = -1; }
          if (s.alpha <= 0.05) { s.alpha = 0.05; s.dir =  1; }
          ctx.save();
          ctx.globalAlpha = s.alpha;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = s.gold ? '#e8d08a' : '#ffffff';
          ctx.fill();
          if (s.r > 0.9 && s.alpha > 0.6) {
            ctx.shadowBlur  = s.r * 6;
            ctx.shadowColor = s.gold ? '#c9a84c' : '#a0b4ff';
            ctx.fill();
          }
          ctx.restore();
        });
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(draw);
    })();

    (function () {
      const layer = document.getElementById('parallaxLayer');
      document.addEventListener('mousemove', e => {
        layer.style.setProperty('--mx', (e.clientX / window.innerWidth  * 100).toFixed(1) + '%');
        layer.style.setProperty('--my', (e.clientY / window.innerHeight * 100).toFixed(1) + '%');
      });
    })();

    (function () {
      const field = document.getElementById('sparkleField');
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'sparkle';
        el.style.cssText = `
          left:   ${Math.random() * 100}%;
          bottom: ${-10 + Math.random() * 20}%;
          --dur:   ${10 + Math.random() * 18}s;
          --delay: ${Math.random() * 20}s;
          width:   ${2 + Math.random() * 3}px;
          height:  ${2 + Math.random() * 3}px;
          opacity: 0;
        `;
        field.appendChild(el);
      }
    })();

    (function () {
      const EVENT_DATE = new Date(2026, 8, 3, 21, 0, 0);
      const elDays  = document.getElementById('cd-days');
      const elHours = document.getElementById('cd-hours');
      const elMins  = document.getElementById('cd-mins');

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        const diff = EVENT_DATE.getTime() - Date.now();
        if (diff <= 0) {
          elDays.textContent = elHours.textContent = elMins.textContent = '00';
          return;
        }
        const t = Math.floor(diff / 1000);
        elDays.textContent  = pad(Math.floor(t / 86400));
        elHours.textContent = pad(Math.floor((t % 86400) / 3600));
        elMins.textContent  = pad(Math.floor((t % 3600) / 60));
      }

      tick();
      setInterval(tick, 30000);
    })();

    (function () {
      const audio = document.getElementById('bgAudio');
      const btn   = document.getElementById('music-btn');
      const icon  = document.getElementById('music-icon');
      let playing = false;

      audio.volume = 0.45;

      function setState(play) {
        playing = play;
        icon.textContent = playing ? '♫' : '♪';
        btn.title        = playing ? 'Silenciar música' : 'Reproducir música';
        btn.style.color  = playing ? 'var(--gold)' : 'rgba(201,168,76,0.45)';
      }

      btn.addEventListener('click', () => {
        if (playing) {
          audio.pause();
          setState(false);
        } else {
          audio.play()
            .then(() => setState(true))
            .catch(err => console.warn('Audio error:', err));
        }
      });

      setState(false);
    })();
  </script>

</body>
</html>
